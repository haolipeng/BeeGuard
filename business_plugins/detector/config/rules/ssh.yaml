# SSH暴力破解检测配置 (仅Linux)
ssh:
  enabled: true

  # 监控的日志文件 (Linux系统)
  log_paths:
    - /var/log/auth.log      # Debian/Ubuntu
    - /var/log/secure        # RHEL/CentOS

  # 检测规则
  rules:
    # 规则1: 认证失败暴力破解
    - name: auth_failure_brute_force
      description: "SSH认证失败暴力破解检测"
      pattern: "Failed (password|publickey) for .* from (\\S+)"
      action: failed
      frequency: 6           # 触发次数
      timeframe: 120         # 时间窗口(秒)
      level: 10              # 告警级别
      ignore: 60             # 触发后抑制时间(秒)
      group_by: source_ip    # 按源IP聚合

    # 规则2: 非法用户暴力破解
    - name: invalid_user_brute_force
      description: "SSH非法用户暴力破解检测"
      pattern: "(Invalid|Illegal) user .* from (\\S+)"
      action: invalid_user
      frequency: 6
      timeframe: 120
      level: 10
      ignore: 60
      group_by: source_ip

  # 白名单IP(不检测)
  whitelist:
    - 127.0.0.1
    - ::1
