# 高危命令检测规则配置文件
# 说明: 此文件定义高危命令的检测规则，支持动态加载

version: "1.0"
description: "高危命令检测规则"

rules:
  # ============================================
  # 危险删除操作
  # ============================================
  - id: 2001
    name: "危险删除操作"
    description: "检测可能导致系统损坏的删除命令，如 rm -rf /"
    severity: "critical"
    enabled: true
    category: "file_delete"
    match:
      type: "regex"
      patterns:
        - "rm\\s+.*-rf\\s+/"
        - "rm\\s+.*--no-preserve-root"
        - "rm\\s+-rf\\s+/\\*"
        - "rm\\s+-rf\\s+~"

  # ============================================
  # 敏感文件访问
  # ============================================
  - id: 2002
    name: "敏感文件访问"
    description: "检测对敏感系统文件的读取或修改操作"
    severity: "high"
    enabled: true
    category: "filesystem_operation"
    match:
      type: "regex"
      patterns:
        - "cat\\s+.*/etc/(passwd|shadow|sudoers)"
        - "vi(m)?\\s+.*/etc/(passwd|shadow|sudoers)"
        - "nano\\s+.*/etc/(passwd|shadow|sudoers)"
        - "less\\s+.*/etc/shadow"
        - "more\\s+.*/etc/shadow"
        - "head\\s+.*/etc/shadow"
        - "tail\\s+.*/etc/shadow"

  # ============================================
  # 危险权限修改
  # ============================================
  - id: 2003
    name: "危险权限修改"
    description: "检测危险的文件权限修改操作，如设置777权限或SUID位"
    severity: "high"
    enabled: true
    category: "permission_modify"
    match:
      type: "regex"
      patterns:
        - "chmod\\s+.*777\\s+/"
        - "chmod\\s+.*\\+s\\s+"
        - "chmod\\s+4[0-7]{3}\\s+"
        - "chown\\s+root:\\s+"
        - "chown\\s+root:root\\s+/"

  # ============================================
  # 内核模块操作
  # ============================================
  - id: 2009
    name: "内核模块操作"
    description: "检测内核模块的加载或卸载操作"
    severity: "high"
    enabled: true
    category: "filesystem_operation"
    match:
      type: "prefix"
      patterns:
        - "insmod"
        - "rmmod"
        - "modprobe"
