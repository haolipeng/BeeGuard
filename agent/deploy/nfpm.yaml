name: cloudsec-agent
arch: "${ARCH}"
platform: linux
version: "${VERSION}"
release: 1
section: default
priority: extra
maintainer: security team
description: |
  cloudsec-agent security probe with collector, baseline, detector,
  ebpf_base_detector, nids, and scanner plugins.
license: Proprietary

contents:
  # --- Agent binary ---
  - src: ../build/agent
    dst: /opt/cloudsec/agent/bin/agent
    file_info:
      mode: 0755
      owner: root
      group: root

  # --- cloudsecctl ---
  - src: ../build/cloudsecctl
    dst: /opt/cloudsec/agent/bin/cloudsecctl
    file_info:
      mode: 0755
      owner: root
      group: root

  # --- Service file ---
  - src: ./cloudsec-agent.service
    dst: /opt/cloudsec/agent/cloudsec-agent.service
    file_info:
      mode: 0644
      owner: root
      group: root

  # --- Agent config ---
  - src: ./agent.yaml
    dst: /opt/cloudsec/agent/agent.yaml
    type: config|noreplace
    file_info:
      mode: 0644
      owner: root
      group: root

  # --- Plugin binaries ---
  - src: ../build/plugins/collector/collector
    dst: /opt/cloudsec/agent/plugins/collector/collector
    file_info:
      mode: 0755
      owner: root
      group: root

  - src: ../build/plugins/baseline/baseline
    dst: /opt/cloudsec/agent/plugins/baseline/baseline
    file_info:
      mode: 0755
      owner: root
      group: root

  - src: ../build/plugins/detector/detector
    dst: /opt/cloudsec/agent/plugins/detector/detector
    file_info:
      mode: 0755
      owner: root
      group: root

  - src: ../build/plugins/ebpf_base_detector/ebpf_base_detector
    dst: /opt/cloudsec/agent/plugins/ebpf_base_detector/ebpf_base_detector
    file_info:
      mode: 0755
      owner: root
      group: root

  - src: ../build/plugins/nids/nids
    dst: /opt/cloudsec/agent/plugins/nids/nids
    file_info:
      mode: 0755
      owner: root
      group: root

  - src: ../build/plugins/scanner/scanner
    dst: /opt/cloudsec/agent/plugins/scanner/scanner
    file_info:
      mode: 0755
      owner: root
      group: root

  # --- detector config ---
  - src: ../business_plugins/detector/config/rules/ssh_brute_force.yaml
    dst: /opt/cloudsec/agent/plugins/detector/config/rules/ssh_brute_force.yaml
    type: config|noreplace
    file_info:
      mode: 0644
      owner: root
      group: root

  - src: ../business_plugins/detector/config/rules/ftp_brute_force.yaml
    dst: /opt/cloudsec/agent/plugins/detector/config/rules/ftp_brute_force.yaml
    type: config|noreplace
    file_info:
      mode: 0644
      owner: root
      group: root

  - src: ../business_plugins/detector/config/rules/ssh_anomaly_login.yaml
    dst: /opt/cloudsec/agent/plugins/detector/config/rules/ssh_anomaly_login.yaml
    type: config|noreplace
    file_info:
      mode: 0644
      owner: root
      group: root

  # --- ebpf_base_detector config ---
  - src: ../business_plugins/ebpf_base_detector/config/dangerous_commands.yaml
    dst: /opt/cloudsec/agent/plugins/ebpf_base_detector/config/dangerous_commands.yaml
    type: config|noreplace
    file_info:
      mode: 0644
      owner: root
      group: root

  - src: ../business_plugins/ebpf_base_detector/config/privilege_escalation_whitelist.yaml
    dst: /opt/cloudsec/agent/plugins/ebpf_base_detector/config/privilege_escalation_whitelist.yaml
    type: config|noreplace
    file_info:
      mode: 0644
      owner: root
      group: root

  - src: ../business_plugins/ebpf_base_detector/config/malicious_request_rules.yaml
    dst: /opt/cloudsec/agent/plugins/ebpf_base_detector/config/malicious_request_rules.yaml
    type: config|noreplace
    file_info:
      mode: 0644
      owner: root
      group: root

  - src: ../business_plugins/ebpf_base_detector/config/sensitive_file_rules.yaml
    dst: /opt/cloudsec/agent/plugins/ebpf_base_detector/config/sensitive_file_rules.yaml
    type: config|noreplace
    file_info:
      mode: 0644
      owner: root
      group: root

  - src: ../business_plugins/ebpf_base_detector/config/file_monitor_whitelist.yaml
    dst: /opt/cloudsec/agent/plugins/ebpf_base_detector/config/file_monitor_whitelist.yaml
    type: config|noreplace
    file_info:
      mode: 0644
      owner: root
      group: root

  - src: ../business_plugins/ebpf_base_detector/config/container_dangerous_commands.yaml
    dst: /opt/cloudsec/agent/plugins/ebpf_base_detector/config/container_dangerous_commands.yaml
    type: config|noreplace
    file_info:
      mode: 0644
      owner: root
      group: root

  - src: ../business_plugins/ebpf_base_detector/config/container_sensitive_file_rules.yaml
    dst: /opt/cloudsec/agent/plugins/ebpf_base_detector/config/container_sensitive_file_rules.yaml
    type: config|noreplace
    file_info:
      mode: 0644
      owner: root
      group: root

  # --- BTF files for kernel compatibility ---
  - src: ../build/btf/
    dst: /opt/cloudsec/agent/btf/
    type: tree
    file_info:
      mode: 0644
      owner: root
      group: root

  # --- baseline config ---
  - src: ../business_plugins/baseline/config/linux/1200.yaml
    dst: /opt/cloudsec/agent/plugins/baseline/config/linux/1200.yaml
    type: config|noreplace
    file_info:
      mode: 0644
      owner: root
      group: root

  - src: ../business_plugins/baseline/config/linux/1300.yaml
    dst: /opt/cloudsec/agent/plugins/baseline/config/linux/1300.yaml
    type: config|noreplace
    file_info:
      mode: 0644
      owner: root
      group: root

  - src: ../business_plugins/baseline/config/linux/1400.yaml
    dst: /opt/cloudsec/agent/plugins/baseline/config/linux/1400.yaml
    type: config|noreplace
    file_info:
      mode: 0644
      owner: root
      group: root

  - src: ../business_plugins/baseline/config/linux/5000.yaml
    dst: /opt/cloudsec/agent/plugins/baseline/config/linux/5000.yaml
    type: config|noreplace
    file_info:
      mode: 0644
      owner: root
      group: root

  # --- nids config ---
  - src: ../business_plugins/nids/config/nids.yaml
    dst: /opt/cloudsec/agent/plugins/nids/config/nids.yaml
    type: config|noreplace
    file_info:
      mode: 0644
      owner: root
      group: root

  - src: ../business_plugins/nids/config/nids.rules
    dst: /opt/cloudsec/agent/plugins/nids/config/nids.rules
    type: config|noreplace
    file_info:
      mode: 0644
      owner: root
      group: root

  # --- scanner config ---
  - src: ../business_plugins/scanner/config/scanner.yaml
    dst: /opt/cloudsec/agent/plugins/scanner/config/scanner.yaml
    type: config|noreplace
    file_info:
      mode: 0644
      owner: root
      group: root

scripts:
  preinstall: ./scripts/preinstall.sh
  postinstall: ./scripts/postinstall.sh
  preremove: ./scripts/preremove.sh

recommends:
  - clamav
  - libclamav-dev

rpm:
  group: Unspecified
  compression: lzma
