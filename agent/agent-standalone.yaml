# Agent Standalone 模式配置
# 用于本地测试高危命令检测功能，不连接 server

# 基础配置（standalone 模式下 server 不是必须的）
# server: "127.0.0.1:50051"
working_directory: "/opt/cloudsec/agent/data/agent"
plugins_directory: "/opt/cloudsec/agent/plugins"
log_directory: "/opt/cloudsec/agent/logs"

# Standalone 模式配置
standalone:
  enabled: true
  output: "stderr"                                    # "stderr" 输出到控制台, 或文件路径（如 "/tmp/results.json"）
  flush_interval: 1                                  # 刷新间隔（秒）
  plugins:
    - ebpf_base_detector                             # 仅加载 ebpf_base_detector 插件
    # - scanner                                      # 恶意文件扫描插件（需要 libclamav）
